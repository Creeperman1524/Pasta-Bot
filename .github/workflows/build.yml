name: Build

on:
    push:
        branches: ['**']
    pull_request:
        branches: ['**']

jobs:
    build:
        name: TypeScript
        runs-on: self-hosted

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            # tsc compiles src/ to dist/ — exits non-zero on any type error
            - name: Build
              run: npm run build

            # Upload the compiled output so it's available for future CD steps
            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/
                  retention-days: 7
