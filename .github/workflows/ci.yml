name: Build

on:
    pull_request:
        branches: [main, dev]
    push:
        branches: [main, dev]

jobs:
    build:
        name: TypeScript
        runs-on: pi

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npx eslint .

            - name: Build
              run: npm run build

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: bot-build
                  path: |
                      dist
                      package.json
                      package-lock.json
