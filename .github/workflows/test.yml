name: Test

on:
    push:
        branches: ['**']
    pull_request:
        branches: ['**']

jobs:
    test:
        name: Jest
        runs-on: self-hosted

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            # Tests are fully mocked — no real DB or Discord connection needed
            - name: Run tests
              run: npm test
