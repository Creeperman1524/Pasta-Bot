name: Lint

on:
    push:
        branches: ['**']
    pull_request:
        branches: ['**']

jobs:
    lint:
        name: ESLint
        runs-on: self-hosted

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            # Run ESLint without --fix so errors cause a non-zero exit code
            - name: Run ESLint
              run: npx eslint .
