name: Deploy

on:
    workflow_run:
        workflows: ['Build']
        types:
            - completed

jobs:
    deploy:
        name: Deployment
        if: >
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.head_branch == 'main'

        runs-on: deployment-runner

        steps:
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                  name: bot-build
                  run-id: ${{ github.event.workflow_run.id }}

            - name: Install dependencies
              run: npm ci --omit=dev

            - name: Move to PastaBot folder
              run: rsync -av --delete \
                  --exclude ".env" \
                  --exclude "logs" \
                  ./ ../Pasta-Bot

            - name: Restart bot
              run: |
                  pm2 restart PastaBot || pm2 start dist/index.js --name PastaBot
